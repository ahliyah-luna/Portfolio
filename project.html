<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Project | Ahliyah Luna</title>
	<link rel="icon" type="image/png" href="./src/assets/icons/favicon.png">
	<link rel="stylesheet" href="./src/styles/styles.css">
</head>
<body>
	<main class="layout">
		<aside class="strip" aria-hidden="true"></aside>

		<section class="content project">
			<header class="project-top">
				<div class="project-header">
					<h1 class="project-title" data-project-title></h1>
					<button class="project-list-btn" type="button" data-open-project-list aria-haspopup="true" aria-controls="project-drawer">
						<span class="project-list-label">project list</span>
						<span class="project-burger" aria-hidden="true">
							<span></span>
							<span></span>
							<span></span>
						</span>
					</button>
				</div>
				<a class="project-back" href="./index.html">← back to home page</a>
			</header>

			<div class="project-works">
				<p class="project-meta" data-project-date></p>
				<p class="project-description" data-project-description></p>
				<div class="project-body" data-project-body></div>
			</div>

			<footer class="footer">
				<div class="footer-left">Ahliyah Luna © 2026</div>
				<div class="footer-right">
					<a href="mailto:ahliyahluna08@gmail.com">ahliyahluna08@gmail.com</a>
					<span> | </span>
					<a href="./src/assets/Resume-Luna.pdf" aria-label="Open CV" target="_blank" rel="noreferrer">CV</a>
				</div>
			</footer>
		</section>
	</main>

	<div class="project-drawer-overlay" data-project-drawer-overlay hidden></div>
	<aside class="project-drawer" id="project-drawer" data-project-drawer aria-label="Project list" hidden>
		<div class="project-drawer-header">
			<div>projects</div>
			<button class="project-drawer-close" type="button" data-close-project-list aria-label="Close">×</button>
		</div>
		<nav class="project-drawer-body" data-project-drawer-body></nav>
	</aside>

	<script type="module" src="./src/js/project-page.js"></script>
</body>
</html>
